<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Craft By Anjali</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <div class="logo">🎨 Craft By Anjali</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="items.html" class="active">Items</a></li>
            <li><a href="about-us.html">About Us</a></li>
            <li><a href="contact-us.html">Contact Us</a></li>
            <li><a href="items.html" class="cart-icon" title="Shopping Cart">🛒 <span id="cart-count" class="cart-count">0</span></a></li>
        </ul>
    </div>
</nav>

<!-- Items Page Header -->
<section class="page-header">
    <h1>Our Rangoli Patches Collection</h1>
    <p>Choose from 50+ exclusive handcrafted designs</p>
</section>

<!-- Filter and Sort -->
<section class="filters-section">
    <div class="filters-container">
        <input type="text" id="search" class="search-box" placeholder="Search patches...">
        <select id="sortBy" class="filter-select">
            <option value="name">Sort by Name</option>
            <option value="price-low">Sort by Price (Low to High)</option>
            <option value="price-high">Sort by Price (High to Low)</option>
        </select>
    </div>
</section>

<!-- Products Grid -->
<section class="products-container">
    <div id="products-grid" class="products-grid">
        <!-- Products will be loaded here by JavaScript -->
    </div>
</section>

<!-- Cart Summary Modal -->
<div id="cartModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Shopping Cart</h2>
        <div id="cart-items" class="cart-items">
            <!-- Cart items will be displayed here -->
        </div>
        <div class="cart-summary">
            <div class="summary-row">
                <span>Subtotal:</span>
                <span id="subtotal">₹0</span>
            </div>
            <div class="summary-row total">
                <span>Total:</span>
                <span id="total">₹0</span>
            </div>
        </div>
        <button id="checkout-btn" class="checkout-btn">Place Order on WhatsApp</button>
    </div>
</div>

<footer>
    <p>&copy; 2026 Craft By Anjali. All rights reserved.</p>
    <p>Handcrafted with love for you</p>
</footer>

<script src="script.js"></script>
<script src="items.js"></script>
</body>
</html>
